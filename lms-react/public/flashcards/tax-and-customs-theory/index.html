<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tax & Customs Theory Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    
    body {
      background: #f8fafc;
      color: #1e293b;
      transition: background 0.3s, color 0.3s;
    }

    body.dark-mode {
      background: #0f0f1a;
      color: #e2e8f0;
    }

    .card-scene { perspective: 1200px; }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
      transition: background 0.3s, border 0.3s;
    }
    .card-back { transform: rotateY(180deg); }

    .card-face.front {
      background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }
    .card-face.back {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border: 1px solid #86efac;
      box-shadow: 0 10px 40px rgba(34, 197, 94, 0.15);
    }

    body.dark-mode .card-face.front {
      background: linear-gradient(135deg, #1e1e3a 0%, #16213e 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }
    body.dark-mode .card-face.back {
      background: linear-gradient(135deg, #1a2a1a 0%, #0d1f2d 100%);
      border: 1px solid rgba(34, 197, 94, 0.2);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 3px; }
    body.dark-mode ::-webkit-scrollbar-track { background: #1a1a2e; }

    .topic-pill.active { background: #4f46e5; color: #fff; }
    .topic-pill { transition: all 0.2s; }

    #progress-bar { transition: width 0.4s ease; }

    #topic-overlay {
      transition: opacity 0.3s, transform 0.3s;
    }
    #topic-overlay.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }
    #topic-overlay.visible { opacity: 1; pointer-events: all; transform: scale(1); }

    .header-light {
      background: rgba(248, 250, 252, 0.8);
      border-bottom: 1px solid #e2e8f0;
    }

    body.dark-mode .header-light {
      background: rgba(15, 15, 26, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .overlay-panel {
      background: #ffffff;
      border: 1px solid #e2e8f0;
    }

    body.dark-mode .overlay-panel {
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .text-muted { color: #64748b; }
    body.dark-mode .text-muted { color: #94a3b8; }

    .text-label { color: #94a3b8; }
    body.dark-mode .text-label { color: #64748b; }

    .text-answer { color: #059669; }
    body.dark-mode .text-answer { color: #10b981; }

    .topic-badge {
      background: rgba(79, 70, 229, 0.1);
      border: 1px solid rgba(79, 70, 229, 0.3);
      color: #4f46e5;
    }

    body.dark-mode .topic-badge {
      background: rgba(79, 70, 229, 0.6);
      border: 1px solid rgba(79, 70, 229, 0.3);
      color: #a5b4fc;
    }

    @media (max-width: 639px) {
      button:active {
        transform: scale(0.95);
      }
    }

    @media (min-width: 400px) {
      .xs\:inline { display: inline; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="header-light flex items-center justify-between px-4 sm:px-6 py-3 sm:py-4 backdrop-blur-sm sticky top-0 z-30">
    <div>
      <h1 class="text-base sm:text-lg font-semibold tracking-tight">Tax & Customs Theory Flashcards</h1>
      <p class="text-xs text-muted" id="header-subtitle">Loading...</p>
    </div>
    <div class="flex items-center gap-2 sm:gap-3">
      <button id="theme-toggle"
        class="p-1.5 sm:p-2 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-all"
        aria-label="Toggle theme">
        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 sm:w-5 sm:h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 sm:w-5 sm:h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
      <button id="shuffle-btn"
        class="p-1.5 sm:p-2 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-all"
        aria-label="Shuffle cards">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 sm:w-5 sm:h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </button>
      <span class="hidden sm:inline text-sm text-muted" id="card-counter">1 / 0</span>
      <button id="topics-btn"
        class="flex items-center gap-1.5 sm:gap-2 px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg sm:rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white text-xs sm:text-sm font-medium transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
        <span class="hidden xs:inline">Topics</span>
      </button>
    </div>
  </header>

  <div class="h-1 bg-slate-200 dark:bg-white/5">
    <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-violet-500 rounded-full" style="width:0%"></div>
  </div>

  <div id="topic-overlay" class="hidden fixed inset-0 z-40 flex items-start justify-center sm:justify-end p-4 pt-16 sm:pt-20">
    <div class="overlay-panel rounded-2xl shadow-2xl w-full max-w-sm sm:w-80 max-h-[80vh] overflow-y-auto p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold">Browse by Topic</h2>
        <button id="close-topics" class="text-muted hover:text-slate-900 dark:hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="topic-list" class="flex flex-col gap-1"></div>
    </div>
  </div>

  <main class="flex-1 flex flex-col items-center justify-center px-3 sm:px-4 py-4 sm:py-8 gap-4 sm:gap-6">

    <div id="topic-badge" class="topic-badge px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-xs font-medium tracking-wide"></div>

    <div class="sm:hidden text-sm text-muted" id="card-counter-mobile">1 / 0</div>

    <div class="card-scene w-full max-w-2xl" style="height: min(340px, 50vh);">
      <div class="card-inner" id="card-inner">
        <div class="card-face front">
          <span class="absolute top-3 sm:top-5 left-4 sm:left-6 text-xs text-label font-medium uppercase tracking-widest">Question</span>
          <p class="text-center text-base sm:text-xl font-medium leading-relaxed px-2 sm:px-4" id="card-front"></p>
          <span class="absolute bottom-3 sm:bottom-5 text-xs text-label">Click to reveal answer</span>
        </div>
        <div class="card-face card-back back">
          <span class="absolute top-3 sm:top-5 left-4 sm:left-6 text-xs text-answer font-medium uppercase tracking-widest">Answer</span>
          <p class="text-center text-sm sm:text-lg text-answer leading-relaxed px-2 sm:px-4" id="card-back"></p>
          <span class="absolute bottom-3 sm:bottom-5 text-xs text-label">Click to flip back</span>
        </div>
      </div>
    </div>

    <div class="flex items-center gap-2 sm:gap-4">
      <button id="prev-btn"
        class="flex items-center gap-1 sm:gap-2 px-3 sm:px-5 py-2 sm:py-2.5 rounded-lg sm:rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-white/5 dark:hover:bg-white/10 border border-slate-200 dark:border-white/10 text-slate-700 dark:text-slate-300 text-xs sm:text-sm font-medium transition-all disabled:opacity-30 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        <span class="hidden xs:inline">Prev</span>
      </button>
      <button id="flip-btn"
        class="px-4 sm:px-6 py-2 sm:py-2.5 rounded-lg sm:rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white text-xs sm:text-sm font-semibold transition-all shadow-lg shadow-indigo-500/30">
        Flip Card
      </button>
      <button id="next-btn"
        class="flex items-center gap-1 sm:gap-2 px-3 sm:px-5 py-2 sm:py-2.5 rounded-lg sm:rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-white/5 dark:hover:bg-white/10 border border-slate-200 dark:border-white/10 text-slate-700 dark:text-slate-300 text-xs sm:text-sm font-medium transition-all disabled:opacity-30 disabled:cursor-not-allowed">
        <span class="hidden xs:inline">Next</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>

    <p class="hidden sm:block text-xs text-muted">← → arrow keys to navigate &nbsp;·&nbsp; Space to flip</p>
  </main>

  <script src="cards.js"></script>
  <script src="app.js"></script>
</body>
</html>
